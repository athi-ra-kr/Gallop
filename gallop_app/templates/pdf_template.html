<!DOCTYPE html>
<html>
<head>
    <meta name="robots" content="noindex">
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }
        body {
            font-family: Arial, sans-serif;
            color: #1B254B;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #FF6B00;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 { color: #FF6B00; font-size: 24px; margin: 0; }
        .report-info { font-size: 12px; color: #A3AED0; margin-top: 5px; }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: #F8F9FF;
            color: #A3AED0;
            font-size: 10px;
            text-transform: uppercase;
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #F1F4F9;
        }
        td {
            padding: 12px 10px;
            font-size: 11px;
            border-bottom: 1px solid #F1F4F9;
        }
        .score {
            color: #FF6B00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Gallop Students Report</h1>
        <p class="report-info">Generated on: {% now "F j, Y" %}</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>Mobile</th>
                <th>City</th>
                <th>Total Score</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.user.username }}</td>
                <td>{{ student.mobile|default:"-" }}</td>
                <td>{{ student.city|default:"-" }}</td>
                <td class="score">{{ student.total_score }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
